<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>mame photography | Booking</title>
    <style>
        /* 全体設定 */
        body { 
            background-color: #f8fbf8; /* 生成り色 */
            color: #433d3c; 
            font-family: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", "Hiragino Sans", sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            letter-spacing: 0.05em;
        }

        .container { 
            width: 100%; 
            max-width: 480px; 
            text-align: center; 
            padding: 40px 0 80px; 
        }

        /* バナー：余白をもたせた配置 */
        .banner-wrapper {
            padding: 0 30px;
            margin-bottom: 60px;
        }
        .banner-img { 
            width: 100%; 
            height: auto; 
            display: block;
        }

        .content-inner { padding: 0 40px; }

        .section { margin-bottom: 80px; }

        .label { 
            font-size: 0.8rem; 
            color: #433d3c; 
            margin-bottom: 15px; 
            display: block; 
            letter-spacing: 0.1em;
            font-weight: 400;
        }

        /* ボタン：動きと透け感の演出 */
        .btn { 
            display: block; 
            width: 100%; 
            padding: 20px 0; 
            background: #433d3c; 
            color: #f8f4e6; 
            border: none; 
            text-decoration: none; 
            font-size: 0.85rem; 
            /* 動きを滑らかにする設定 */
            transition: all 0.4s cubic-bezier(0.25, 0.8, 0.25, 1); 
            cursor: pointer; 
            border-radius: 0;
            outline: none;
            position: relative;
            overflow: hidden;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        /* 予約開始後のボタンホバー（タップ）時 */
        .btn:hover:not(:disabled) { 
            transform: translateY(-3px); /* 上に浮く */
            box-shadow: 0 12px 20px rgba(67, 61, 60, 0.2); /* 影を深く */
            opacity: 0.9;
        }

        /* ボタンが押された瞬間の沈み込み */
        .btn:active:not(:disabled) {
            transform: translateY(0);
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        /* 予約開始前の透け感設定 */
        .btn:disabled { 
            background: #433d3c;
            opacity: 0.2; /* 透け感 */
            cursor: not-allowed; 
            box-shadow: none;
            transform: none;
        }

        .status-text {
            font-size: 0.75rem;
            margin-top: 12px;
            color: #888;
            font-feature-settings: "tnum";
        }

        footer { 
            margin-top: 40px; 
            font-size: 0.6rem; 
            color: #aaa; 
            letter-spacing: 0.2em; 
        }
    </style>
</head>
<body>

<div class="container">
    <div class="banner-wrapper">
        <img src="マンスリーフォトバナー.png" alt="mame photography banner" class="banner-img">
    </div>

    <div class="content-inner">
        <div class="section">
            <span class="label">リピーター様はこちら</span>
            <button id="repeater-btn" onclick="repeaterLogin()" class="btn" disabled>先行予約フォームを開く</button>
            <div id="repeater-msg" class="status-text"></div>
        </div>

        <div class="section">
            <span class="label">一般のお客様はこちら</span>
            <button id="general-btn" onclick="goToBooking()" class="btn" disabled>予約フォームを開く</button>
            <div id="general-msg" class="status-text"></div>
        </div>

        <footer>© MAME PHOTOGRAPHY</footer>
    </div>
</div>

<script>
    /* =========================================
       ★ 毎月の書き換えエリア ★
       ========================================= */

    const YOYAKU_URL = "https://liff.line.me/2004728887-16gomWqr?booking_event_id=34741&ts=1773107366";
    const PASSWORD = "mame2026";

    // リピーター様の先行予約開始時間
    const REPEATER_START_TIME = new Date("2026-03-21T9:00:00").getTime();

    // 一般のお客様の予約開始時間
    const GENERAL_START_TIME = new Date("2026-03-21T12:00:00").getTime();

    /* ========================================= */

    function repeaterLogin() {
        const input = prompt("リピーター様専用パスワードを入力してください");
        if (input && input.trim() === PASSWORD) {
            window.location.href = YOYAKU_URL;
        } else if (input !== null) {
            alert("パスワードが正しくありません");
        }
    }

    function updateStatus() {
        const now = new Date().getTime();

        // リピーター用ボタン
        const rBtn = document.getElementById('repeater-btn');
        const rMsg = document.getElementById('repeater-msg');
        const rDiff = REPEATER_START_TIME - now;

        if (rDiff <= 0) {
            rBtn.disabled = false;
            rMsg.innerText = "ご予約受付中";
        } else {
            rMsg.innerText = `先行予約開始まで あと ${formatDiff(rDiff)}`;
        }

        // 一般用ボタン
        const gBtn = document.getElementById('general-btn');
        const gMsg = document.getElementById('general-msg');
        const gDiff = GENERAL_START_TIME - now;

        if (gDiff <= 0) {
            gBtn.disabled = false;
            gMsg.innerText = "ご予約受付中";
        } else {
            gMsg.innerText = `予約開始まで あと ${formatDiff(gDiff)}`;
        }
    }

    function formatDiff(diff) {
        const h = Math.floor(diff / (1000 * 60 * 60));
        const m = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
        const s = Math.floor((diff % (1000 * 60)) / 1000);
        return `${h}時間${m}分${s}秒`;
    }

    function goToBooking() { window.location.href = YOYAKU_URL; }
    setInterval(updateStatus, 1000);
    updateStatus();
</script>

</body>
</html>
